<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
  <!-- Definition of gradients or styles if needed -->
  <style>
    .star-red { fill: #E31E24; }
    .star-blue { fill: #11235A; }
    .text-star { font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif; font-weight: 900; fill: #11235A; font-size: 195px; letter-spacing: 2px; }
    .text-enterprises { font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif; font-weight: 800; fill: #E31E24; font-size: 78px; letter-spacing: 16px; }
  </style>

  <g id="logo-emblem" transform="translate(10, 10)">
    <!-- RED TOP STAR PART -->
    <!-- Top point, side points, with flat bottom cut -->
    <path class="star-red" d="M 150,45 L 188,140 L 305,140 L 210,195 L 222,210 L 150,185 L 78,210 L 90,195 L -5,140 L 112,140 Z" />

    <!-- STYLIZED BLUE SPEED STRIPES / WING (Representing the bottom part of the star) -->
    <!-- Slashed stripes slanted from top-right to bottom-left -->
    <!-- Top Stripe (Longest, thickest) -->
    <polygon class="star-blue" points="75,220 225,220 205,250 85,250" />
    <!-- Middle Stripe -->
    <polygon class="star-blue" points="100,265 190,265 175,295 110,295" />
    <!-- Bottom Stripe (Shortest) -->
    <polygon class="star-blue" points="125,310 160,310 148,340 133,340" />
  </g>

  <!-- LOGO TEXT SECTION -->
  <g id="logo-text">
    <text x="345" y="275" class="text-star">STAR</text>
    <text x="355" y="375" class="text-enterprises">ENTERPRISES</text>
  </g>
</svg>
